name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://scouter:testpass@localhost:5432/scouter_test
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      SECRET_KEY: ci-test-secret-not-for-production
      APP_ENV: development
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Lint (ruff check)
        run: ruff check app/ tests/
      - name: Format check (ruff format)
        run: ruff format --check app/ tests/
      - name: Type check (mypy) — advisory, ~115 errors remain across 43 files
        run: mypy app/ --ignore-missing-imports || true
      - name: Type check (mypy strict subset) — these modules MUST stay clean
        run: >-
          mypy
          app/core/
          app/db/
          app/data/
          app/mail/
          app/crawlers/
          app/schemas/
          app/models/
          app/llm/
          --ignore-missing-imports
      - name: Test (pytest)
        run: pytest -x -q --tb=short --cov=app --cov-report=term-missing --cov-fail-under=65

  frontend:
    name: Frontend (lint + typecheck + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint (eslint)
        run: npm run lint
      - name: Type check
        run: npx tsc --noEmit
      - name: Test (vitest)
        run: npx vitest run --reporter=verbose

  e2e:
    name: E2E (Playwright)
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run E2E tests
        run: npx playwright test
        continue-on-error: true
